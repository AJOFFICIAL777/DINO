<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINO RUN WITH AJ</title>

<style>
body{
    margin:0;
    background:#f7f7f7;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:10px;
}

#score{
    font-size:24px;
    margin-bottom:10px;
}

#game{
    width:800px;
    height:250px;
    border:2px solid black;
    margin:auto;
    position:relative;
    overflow:hidden;
    background:white;
}

#dino{
    width:50px;
    height:50px;
    background:black;
    position:absolute;
    bottom:0;
    left:50px;
}

.jump{
    animation:jump 0.6s linear;
}

@keyframes jump{
    0%{bottom:0;}
    50%{bottom:120px;}
    100%{bottom:0;}
}

#cactus{
    width:25px;
    height:50px;
    background:green;
    position:absolute;
    bottom:0;
    right:-25px;
    animation:block 2s infinite linear;
}

@keyframes block{
    0%{right:-25px;}
    100%{right:800px;}
}

#gameover{
    display:none;
    font-size:30px;
    color:red;
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🦖 DINO RUN WITH AJ</h1>

<h2 id="welcome"></h2>

<div id="score">Score: 0</div>

<div id="game">
    <div id="dino"></div>
    <div id="cactus"></div>
</div>

<div id="gameover">
    💀 GAME OVER
    <br><br>
    <button onclick="location.reload()">Restart</button>
</div>

<h3>💜 Supporters</h3>
<p>⭐ AJ</p>
<p>⭐ Ephraim</p>
<p>⭐ Aalok</p>
  <p>⭐made by Aajimin</p>

<script>

let username = localStorage.getItem("dinoUser");

if(!username){
    username = prompt("Enter your username");
    if(!username || username.trim()===""){
        username="Player";
    }
    localStorage.setItem("dinoUser",username);
}

document.getElementById("welcome").innerHTML =
"👋 Welcome, " + username;

const dino = document.getElementById("dino");
const cactus = document.getElementById("cactus");

let score = 0;

document.addEventListener("keydown",function(e){
    if(e.code==="Space"){
        jump();
    }
});

document.addEventListener("click",jump);

function jump(){

    if(dino.classList.contains("jump")) return;

    dino.classList.add("jump");

    setTimeout(()=>{
        dino.classList.remove("jump");
    },600);
}

setInterval(()=>{

    score++;

    document.getElementById("score").innerHTML =
    "Score: " + score;

    let dinoTop =
    parseInt(window.getComputedStyle(dino)
    .getPropertyValue("bottom"));

    let cactusLeft =
    parseInt(window.getComputedStyle(cactus)
    .getPropertyValue("right"));

    if(
        cactusLeft > 700 &&
        cactusLeft < 760 &&
        dinoTop < 40
    ){

        cactus.style.animation="none";

        document.getElementById("gameover")
        .style.display="block";

    }

},100);

</script>

</body>
</html>
